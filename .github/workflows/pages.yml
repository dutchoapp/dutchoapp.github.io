name: Deploy dutcho.app site

# Pages Source for this repo is "GitHub Actions", so a workflow must publish
# the site. This uploads the repo root (landing page, /join handler, AASA)
# and deploys it on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Whole repo root: index.html, terms/, privacy/, 404.html,
          # .well-known/apple-app-site-association, CNAME.
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
